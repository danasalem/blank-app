[request_definition]
r = role, data, act, consent, is_youth, is_quiet_hours, location, stress

[policy_definition]
p = role, data, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = r.role == p.role && r.data == p.data && r.act == p.act && r.consent == "True" && !(r.role == "coach" && r.location == "Home") && r.is_quiet_hours == "False" && !(r.role == "sponsor" && r.stress >= 8)